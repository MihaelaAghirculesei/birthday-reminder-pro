<button
  class="message-indicator-button"
  [matTooltip]="tooltipKey() | translate:tooltipParams()"
  matTooltipClass="message-indicator-tooltip"
  [style.border-color]="hasActiveMessages() ? 'var(--scheduler-accent)' : '#95a5a6'"
  type="button"
  [attr.aria-label]="'MESSAGE_INDICATOR.STATUS_ARIA' | translate"
  >
  @if (hasActiveMessages()) {
    <picture>
      <source srcset="assets/icons/configured-message.webp" type="image/webp" width="36" height="36">
      <img
        src="assets/icons/configured-message.png"
        alt="Message configured"
        class="configured-message-icon"
        width="36"
        height="36"
        loading="lazy"
        decoding="async"
        />
    </picture>
  } @else {
    <picture>
      <source srcset="assets/icons/not-configured-message.webp" type="image/webp" width="36" height="36">
      <img
        src="assets/icons/not-configured-message.png"
        alt="No message configured"
        class="not-configured-message-icon"
        width="36"
        height="36"
        loading="lazy"
        decoding="async"
        />
    </picture>
  }

  @if (hasActiveMessages() && activeMessageCount() > 1) {
    <span class="message-count">
      {{ activeMessageCount() }}
    </span>
  }
</button>
