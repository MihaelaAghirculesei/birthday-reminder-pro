<div class="dashboard-container" data-testid="dashboard">
  <div class="dashboard-section">
    <div class="dashboard-section-header">
      <div class="dashboard-section-title-wrapper">
        <h3 class="dashboard-section-title">
          <div class="dashboard-title-icon-wrapper">
            <app-calendar-icon
              size="38"
              strokeWidth="2"
              cssClass="dashboard-hero-icon"
            ></app-calendar-icon>
          </div>
          Dashboard & Statistics
        </h3>
        <p class="dashboard-section-subtitle">
          Overview of your birthday collection
        </p>
      </div>
    </div>
  </div>

  <app-dashboard-stats
    [totalBirthdays]="facade.totalBirthdays()"
    [birthdaysThisMonth]="facade.birthdaysThisMonth()"
    [averageAge]="facade.averageAge()"
    [nextBirthdayDays]="facade.nextBirthdayDays()"
    [nextBirthdayText]="facade.nextBirthdayText()"
  ></app-dashboard-stats>

  <app-notification-permission-banner></app-notification-permission-banner>

  <app-category-filter
    [categoriesStats]="facade.categoriesStats()"
    [selectedCategory]="facade.selectedCategory()"
    (categorySelected)="onCategorySelect($event)"
    (filterCleared)="onClearCategoryFilter()"
    (addCategoryClicked)="onAddCategory()"
    (editCategoryClicked)="onEditCategory($event)"
    (deleteCategoryClicked)="onDeleteCategory($event)"
  ></app-category-filter>

  <app-birthday-list
    [birthdays]="facade.filteredBirthdays()"
    [categories]="facade.categories()"
    [searchTerm]="facade.searchTerm()"
    [lastAction]="facade.lastAction()"
    [totalBirthdays]="facade.totalBirthdays()"
    (searchTermChange)="onSearchTermChange($event)"
    (clearSearch)="onClearSearch()"
    (undoAction)="onUndoAction()"
    (addTestData)="onAddTestData()"
    (clearAllData)="onClearAllData()"
    (birthdaysImported)="onBirthdaysImported($event)"
  ></app-birthday-list>

  <button
    mat-fab
    color="primary"
    class="schedule-message-fab"
    (click)="onOpenMessageDialog($event)"
    matTooltip="Schedule Birthday Messages"
    matTooltipPosition="left"
    aria-label="Schedule birthday messages"
  >
    <mat-icon>schedule_send</mat-icon>
  </button>

  <div class="full-width-section">
    @defer (on viewport) {
      <app-birthday-chart
        [chartData]="facade.chartData()"
        [maxCount]="facade.maxCount()"
        [currentMonth]="currentMonth"
        [totalBirthdays]="facade.totalBirthdays()"
      ></app-birthday-chart>
    } @placeholder {
      <div class="chart-placeholder" style="height: 200px; display: flex; align-items: center; justify-content: center;">
        <mat-icon>bar_chart</mat-icon>
      </div>
    }
  </div>

  <div class="full-width-section">
    @defer (on viewport) {
      <app-google-calendar-sync></app-google-calendar-sync>
    } @placeholder {
      <div class="calendar-sync-placeholder">
        <mat-icon>cloud_sync</mat-icon>
        <span>Google Calendar Sync</span>
      </div>
    } @loading (minimum 200ms) {
      <div class="calendar-sync-loading">
        <mat-icon>hourglass_empty</mat-icon>
        <span>Loading...</span>
      </div>
    }
  </div>
</div>
