@if (totalBirthdays > 0) {
  <div class="backup-section">
    <mat-card class="backup-card">
      <mat-card-content>
        <div class="backup-content">
          <mat-icon class="backup-icon">backup</mat-icon>
          <div class="backup-info">
            <h3>{{ 'IMPORT_EXPORT.TITLE' | translate }}</h3>
            <p>{{ 'IMPORT_EXPORT.SUBTITLE' | translate }}</p>
          </div>
          <div class="backup-actions">
            <button
              mat-stroked-button
              color="primary"
              (click)="onExportJSON()"
              [disabled]="isImporting()"
              [matTooltip]="'IMPORT_EXPORT.TOOLTIP_EXPORT_JSON' | translate"
              [attr.aria-label]="'IMPORT_EXPORT.EXPORT_JSON' | translate">
              <mat-icon>download</mat-icon>
              JSON
            </button>
            <button
              mat-stroked-button
              color="primary"
              (click)="onExportCSV()"
              [disabled]="isImporting()"
              [matTooltip]="'IMPORT_EXPORT.TOOLTIP_EXPORT_CSV' | translate"
              [attr.aria-label]="'IMPORT_EXPORT.EXPORT_CSV' | translate">
              <mat-icon>download</mat-icon>
              CSV
            </button>
            <button
              mat-stroked-button
              color="accent"
              (click)="jsonInput.click()"
              [disabled]="isImporting()"
              [matTooltip]="'IMPORT_EXPORT.TOOLTIP_IMPORT_JSON' | translate"
              [attr.aria-label]="'IMPORT_EXPORT.IMPORT_JSON' | translate">
              <mat-icon>upload</mat-icon>
              {{ isImporting() ? ('IMPORT_EXPORT.IMPORTING' | translate) : ('IMPORT_EXPORT.IMPORT_JSON' | translate) }}
            </button>
            <button
              mat-stroked-button
              color="accent"
              (click)="csvInput.click()"
              [disabled]="isImporting()"
              [matTooltip]="'IMPORT_EXPORT.TOOLTIP_IMPORT_CSV' | translate"
              [attr.aria-label]="'IMPORT_EXPORT.IMPORT_CSV' | translate">
              <mat-icon>upload</mat-icon>
              {{ isImporting() ? ('IMPORT_EXPORT.IMPORTING' | translate) : ('IMPORT_EXPORT.IMPORT_CSV' | translate) }}
            </button>
            <button
              mat-stroked-button
              color="accent"
              (click)="vcardInput.click()"
              [disabled]="isImporting()"
              [matTooltip]="'IMPORT_EXPORT.TOOLTIP_IMPORT_VCARD' | translate"
              [attr.aria-label]="'IMPORT_EXPORT.IMPORT_VCARD' | translate">
              <mat-icon>upload</mat-icon>
              {{ isImporting() ? ('IMPORT_EXPORT.IMPORTING' | translate) : ('IMPORT_EXPORT.IMPORT_VCARD' | translate) }}
            </button>
            <input
              #jsonInput
              type="file"
              accept=".json"
              (change)="onImportBackup($event)"
              hidden
              [attr.aria-label]="'IMPORT_EXPORT.IMPORT_JSON' | translate" />
            <input
              #csvInput
              type="file"
              accept=".csv"
              (change)="onImportCSV($event)"
              hidden
              [attr.aria-label]="'IMPORT_EXPORT.IMPORT_CSV' | translate" />
            <input
              #vcardInput
              type="file"
              accept=".vcf"
              (change)="onImportVCard($event)"
              hidden
              [attr.aria-label]="'IMPORT_EXPORT.IMPORT_VCARD' | translate" />
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
}
