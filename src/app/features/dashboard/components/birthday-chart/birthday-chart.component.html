<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon aria-hidden="true">bar_chart</mat-icon>
      {{ 'CHART.TITLE' | translate }}
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <!--
      <figure> ha role="figure" implicito.
      aria-label  → nome breve del grafico (letto subito dallo SR)
      aria-describedby → punta alla <figcaption> con il testo descrittivo completo
    -->
    <figure
      class="chart-figure"
      [attr.aria-label]="'CHART.TITLE' | translate"
      [attr.aria-describedby]="chartDescId"
    >
      <!-- Descrizione completa per screen reader (visivamente nascosta) -->
      <figcaption [id]="chartDescId" class="sr-only">
        {{ getChartAriaLabel() }}
      </figcaption>

      <!--
        Tabella dati accessibile (sr-only): alternativa testuale al grafico.
        Gli screen reader possono navigarla cella per cella per i dettagli mensili.
      -->
      <table class="sr-only" [attr.aria-label]="'CHART.TITLE' | translate">
        <caption>{{ 'CHART.TITLE' | translate }}</caption>
        <thead>
          <tr>
            <th scope="col">{{ 'CHART.TABLE_MONTH' | translate }}</th>
            <th scope="col">{{ 'CHART.TABLE_COUNT' | translate }}</th>
          </tr>
        </thead>
        <tbody>
          @for (item of chartDataItems; track item.month) {
            <tr>
              <td>{{ item.label }}</td>
              <td>{{ item.count }}</td>
            </tr>
          }
        </tbody>
      </table>

      <!--
        Grafico visivo: aria-hidden perché i dati sono già esposti dalla tabella.
        Nessun role/aria ridondante sulle barre.
      -->
      <div class="chart-container" aria-hidden="true">
        @for (monthData of chartDataItems; track monthData.month) {
          <div class="chart-bar">
            @if (monthData.count > 0) {
              <div class="bar-value">{{ monthData.count }}</div>
            }
            <div class="bar-container">
              <div
                class="bar"
                [style.height.%]="monthData.heightPercent"
                [class.current-month]="monthData.isCurrentMonth"
              ></div>
            </div>
            <div class="bar-label">{{ monthData.month }}</div>
          </div>
        }
      </div>

      @if (totalBirthdays === 0) {
        <div class="chart-legend" role="status" aria-live="polite">
          <p class="no-data-text">{{ 'CHART.NO_DATA' | translate }}</p>
        </div>
      }
    </figure>
  </mat-card-content>
</mat-card>
