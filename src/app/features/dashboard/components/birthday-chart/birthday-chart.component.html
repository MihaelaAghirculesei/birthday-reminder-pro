<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon aria-hidden="true">bar_chart</mat-icon>
      {{ 'CHART.TITLE' | translate }}
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div
      class="chart-container"
      role="img"
      [attr.aria-label]="getChartAriaLabel()"
    >
      @for (monthData of enrichedChartData; track monthData.month) {
        <div
          class="chart-bar"
          role="listitem"
          [attr.aria-label]="getBarAriaLabel(monthData.month, monthData.count)"
        >
          @if (monthData.count > 0) {
            <div class="bar-value" aria-hidden="true">
              {{ monthData.count }}
            </div>
          }
          <div class="bar-container">
            <div
              class="bar"
              [style.height.%]="monthData.heightPercent"
              [class.current-month]="monthData.isCurrentMonth"
              aria-hidden="true"
            ></div>
          </div>
          <div class="bar-label" aria-hidden="true">{{ monthData.month }}</div>
        </div>
      }
    </div>
    @if (totalBirthdays === 0) {
      <div class="chart-legend" role="status" aria-live="polite">
        <p class="no-data-text">{{ 'CHART.NO_DATA' | translate }}</p>
      </div>
    }
  </mat-card-content>
</mat-card>
