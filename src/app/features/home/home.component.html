@if (birthdays().length === 0) {
  <div class="test-data-section">
    <mat-card class="test-data-card">
      <mat-card-content>
        <div class="test-data-content">
          <mat-icon class="test-icon">groups</mat-icon>
          <div class="test-info">
            <h2>{{ 'HOME.EXPLORE_TITLE' | translate }}</h2>
            <p>{{ 'HOME.EXPLORE_SUBTITLE' | translate }}</p>
          </div>
          <button mat-raised-button color="primary" (click)="addTestData()" [disabled]="isAddingTestData()" class="add-test-btn" data-testid="show-demo-button">
            @if (isAddingTestData()) {
              <mat-progress-spinner diameter="20" mode="indeterminate"></mat-progress-spinner>
            } @else {
              <mat-icon>visibility</mat-icon>
            }
            {{ isAddingTestData() ? ('HOME.LOADING' | translate) : ('HOME.SHOW_DEMO' | translate) }}
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
}

<div class="content-sections">
  <mat-card class="add-birthday-card">
    <mat-card-header class="collapsible-header"
      data-testid="add-birthday-button"
      role="button"
      tabindex="0"
      [attr.aria-expanded]="isAddBirthdayExpanded"
      aria-controls="add-birthday-form"
      (click)="toggleAddBirthdaySection()"
      (keydown.enter)="toggleAddBirthdaySection()"
      (keydown.space)="toggleAddBirthdaySection(); $event.preventDefault()"
      [title]="(isAddBirthdayExpanded ? 'HOME.CLICK_TO_CLOSE' : 'HOME.CLICK_TO_ADD') | translate">
      <mat-card-title>{{ 'HOME.ADD_BIRTHDAY_TITLE' | translate }}</mat-card-title>
      <mat-icon class="expand-icon" [class.expanded]="isAddBirthdayExpanded">
        {{ isAddBirthdayExpanded ? 'remove_circle' : 'add_circle' }}
      </mat-icon>
    </mat-card-header>
    @if (isAddBirthdayExpanded) {
      <mat-card-content id="add-birthday-form" [@expandCollapse]>
        <app-birthday-form
          [categories]="categories()"
          (birthdaySubmitted)="onBirthdaySubmitted($event)">
        </app-birthday-form>
      </mat-card-content>
    }
  </mat-card>
</div>

<ng-container #dashboardContainer></ng-container>
